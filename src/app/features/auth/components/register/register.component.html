<div class="register-page">
  <!-- Animated background orbs -->
  <div class="bg-orb bg-orb-1"></div>
  <div class="bg-orb bg-orb-2"></div>
  <div class="bg-orb bg-orb-3"></div>

  <div class="register-container">
    <!-- Left panel — Branding -->
    <div class="register-branding">
      <div class="branding-content">
        <div class="logo-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 17L12 22L22 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 12L12 17L22 12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <h1 class="branding-title">PrestamoSim</h1>
        <p class="branding-subtitle">Crea tu cuenta y empieza a simular</p>
        <div class="branding-features">
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
            </div>
            <span>Regístrate en segundos</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <span>100% gratuito y seguro</span>
          </div>
          <div class="feature-item">
            <div class="feature-icon">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            </div>
            <span>Comparte simulaciones con tu equipo</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Right panel — Register Form -->
    <div class="register-form-panel">
      <div class="form-wrapper">
        <div class="form-header">
          <h2>Crear cuenta</h2>
          <p>Completa tus datos para comenzar</p>
        </div>

        <!-- TODO: Conecta este formulario con tu lógica de registro -->
        <form class="register-form" id="registerForm">
          <!-- Error message -->
          <div class="error-banner" *ngIf="errorMessage">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
            <span>{{ errorMessage }}</span>
          </div>

          <div class="form-group">
            <label for="register-name">Nombre completo</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              <input
                type="text"
                id="register-name"
                placeholder="Juan Pérez"
                [(ngModel)]="name"
                name="name"
                autocomplete="name"
              />
            </div>
          </div>

          <div class="form-group">
            <label for="register-email">Correo electrónico</label>
            <div class="input-wrapper">
              <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
              <input
                type="email"
                id="register-email"
                placeholder="tu@correo.com"
                [(ngModel)]="email"
                name="email"
                autocomplete="email"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="register-password">Contraseña</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input
                  type="password"
                  id="register-password"
                  placeholder="••••••••"
                  [(ngModel)]="password"
                  name="password"
                  autocomplete="new-password"
                />
              </div>
            </div>

            <div class="form-group">
              <label for="register-confirm">Confirmar</label>
              <div class="input-wrapper">
                <svg class="input-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                <input
                  type="password"
                  id="register-confirm"
                  placeholder="••••••••"
                  [(ngModel)]="confirmPassword"
                  name="confirmPassword"
                  autocomplete="new-password"
                />
              </div>
            </div>
          </div>

          <!-- TODO: Agrega la función (click) para manejar el registro -->
          <button
            type="submit"
            class="btn-primary"
            id="register-submit"
            [disabled]="isLoading"
          >
            <span *ngIf="!isLoading">Crear Cuenta</span>
            <span *ngIf="isLoading" class="spinner"></span>
          </button>
        </form>

        <div class="form-footer">
          <p>¿Ya tienes una cuenta? <a routerLink="/login" id="go-to-login">Inicia Sesión</a></p>
        </div>
      </div>
    </div>
  </div>
</div>
